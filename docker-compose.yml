services:
  proptimus-api:
    image: registry.gitlab.ics.muni.cz:443/ceitec-cf-biodata/proptimus/proptimus-api:production
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_APP=routes.py
      - CORS_ORIGINS=http://147.251.245.48,http://147.251.245.48:5000,http://localhost:3000,http://localhost:5000
    volumes:
      - ./api/proptimus-api/app/calculated_structures:/app/app/calculated_structures
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  proptimus-ui:
    image: registry.gitlab.ics.muni.cz:443/ceitec-cf-biodata/proptimus/proptimus-ui:production
    ports:
      - "80:3000"
    environment:
      - NEXT_PUBLIC_APP_NAME=Proptimus
      - NEXT_PUBLIC_API_URL=http://147.251.245.48:5000
    depends_on:
      - proptimus-api
    restart: unless-stopped