version: '3.8'

services:
  fffold-ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_NAME: "FFFold"
        NEXT_PUBLIC_API_URL: "http://localhost:5000"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_APP_NAME=FFFold
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    restart: unless-stopped
