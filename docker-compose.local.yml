services:
  proptimus-api:
    build:
      context: ./api/proptimus-api
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=routes.py
      - FLASK_DEBUG=1
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5000,http://127.0.0.1:3000,http://localhost:80
    volumes:
      - ./api/proptimus-api/app:/app/app:rw
      - ./calculated_structures:/app/app/calculated_structures:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  proptimus-ui:
    build:
      context: ./ui/proptimus-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_NAME: "Proptimus"
        NEXT_PUBLIC_API_URL: "http://localhost:5000"
    ports:
      - "3000:80"
    environment:
      - NEXT_PUBLIC_APP_NAME=Proptimus
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - proptimus-api
    restart: unless-stopped
